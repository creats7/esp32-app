<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <title>Rep Tracker - Musculation Connectée</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --accent-primary: #22c55e;
            --accent-secondary: #ef4444;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: #475569;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg-primary), var(--bg-secondary));
            color: var(--text-primary);
            min-height: 100vh;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* ============================================
           SCREENS (each screen = display: none by default)
           ============================================ */
        .screen {
            display: none;
        }
        
        .screen.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* ============================================
           COMMON COMPONENTS
           ============================================ */
        .header {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }
        
        .title {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(90deg, var(--accent-primary), #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        .btn {
            width: 100%;
            min-height: 56px;
            padding: 16px 24px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 12px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-primary), #16a34a);
            color: white;
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
        }
        
        .btn-primary:active { transform: scale(0.98); }
        
        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }
        
        .btn-danger {
            background: var(--accent-secondary);
            color: white;
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--bg-tertiary);
            border-radius: 20px;
            font-size: 13px;
            margin-top: 12px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-secondary);
        }
        
        .status-badge.connected .status-dot {
            background: var(--accent-primary);
            box-shadow: 0 0 8px var(--accent-primary);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        /* ============================================
           SCREEN: ACTIVE SESSION
           ============================================ */
        .session-header {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid var(--border-color);
        }
        
        .session-timer {
            font-size: 48px;
            font-weight: 700;
            color: var(--accent-primary);
            text-align: center;
            margin: 20px 0;
        }
        
        .exercise-list {
            margin-bottom: 20px;
        }
        
        .exercise-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 12px;
        }
        
        .exercise-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        
        .exercise-stats {
            display: flex;
            gap: 20px;
        }
        
        .stat {
            flex: 1;
        }
        
        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--accent-primary);
        }
        
        .current-exercise-counter {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.1), rgba(59, 130, 246, 0.1));
            border: 2px solid var(--accent-primary);
            border-radius: 16px;
            padding: 32px;
            text-align: center;
            margin-bottom: 16px;
        }
        
        .counter-label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        
        .counter-value {
            font-size: 72px;
            font-weight: 700;
            color: var(--accent-primary);
        }
        
        /* ============================================
           SCREEN: HISTORY
           ============================================ */
        .session-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .session-item:active {
            transform: scale(0.98);
        }
        
        .session-date {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        
        .session-summary {
            display: flex;
            gap: 20px;
            margin-top: 12px;
        }
        
        .summary-stat {
            flex: 1;
            text-align: center;
            padding: 12px;
            background: var(--bg-tertiary);
            border-radius: 8px;
        }
        
        .summary-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--accent-primary);
        }
        
        .summary-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        
        /* ============================================
           MODAL
           ============================================ */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            padding: 20px;
            overflow-y: auto;
        }
        
        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 24px;
            max-width: 500px;
            width: 100%;
            border: 1px solid var(--border-color);
        }
        
        .modal-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }
        
        .form-input {
            width: 100%;
            padding: 12px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 16px;
        }
        
        /* ============================================
           SHARE CANVAS
           ============================================ */
        #shareCanvas {
            display: none;
        }
        
        .share-preview {
            width: 100%;
            max-width: 400px;
            margin: 20px auto;
            border-radius: 12px;
            overflow: hidden;
        }
        
        .toast {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            max-width: 400px;
            margin: 0 auto;
            padding: 16px 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-left: 4px solid var(--accent-primary);
            border-radius: 12px;
            color: white;
            transform: translateY(-200px);
            transition: transform 0.3s;
            z-index: 2000;
        }
        
        .toast.show {
            transform: translateY(0);
        }
        
        .toast.error {
            border-left-color: var(--accent-secondary);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ============================================
             SCREEN 1: HOME
             ============================================ -->
        <div id="screenHome" class="screen active">
            <div class="header">
                <h1 class="title">💪 Rep Tracker</h1>
                <p class="subtitle">Votre coach musculation connecté</p>
                <div class="status-badge" id="homeStatusBadge">
                    <span class="status-dot"></span>
                    <span id="homeStatusText">Non connecté</span>
                </div>
            </div>
            
            <button class="btn btn-primary" id="btnConnect">
                📡 Connecter le boîtier
            </button>
        </div>
        
        <!-- ============================================
             SCREEN 2: DASHBOARD
             ============================================ -->
        <div id="screenDashboard" class="screen">
            <div class="header">
                <h1 class="title">📊 Dashboard</h1>
                <p class="subtitle">Prêt à vous entraîner</p>
            </div>
            
            <button class="btn btn-primary" id="btnStartSession">
                🏋️ Démarrer une séance
            </button>
            
            <button class="btn btn-secondary" id="btnViewHistory">
                📅 Voir mes séances
            </button>
            
            <button class="btn btn-secondary" id="btnDisconnect">
                🔌 Déconnecter
            </button>
        </div>
        
        <!-- ============================================
             SCREEN 3: ACTIVE SESSION
             ============================================ -->
        <div id="screenSession" class="screen">
            <div class="session-header">
                <h2 class="title">Séance en cours</h2>
                <div class="session-timer" id="sessionTimer">00:00</div>
            </div>
            
            <!-- Current exercise counter -->
            <div id="currentExerciseContainer" style="display: none;">
                <div class="current-exercise-counter">
                    <div class="counter-label">Répétitions</div>
                    <div class="counter-value" id="currentRepCount">0</div>
                </div>
                
                <button class="btn btn-secondary" id="btnFinishExercise">
                    ✅ Terminer l'exercice
                </button>
            </div>
            
            <!-- Exercise list -->
            <div class="exercise-list" id="exerciseList">
                <!-- Populated dynamically -->
            </div>
            
            <button class="btn btn-primary" id="btnAddExercise">
                ➕ Ajouter un exercice
            </button>
            
            <button class="btn btn-danger" id="btnEndSession">
                🏁 Terminer la séance
            </button>
        </div>
        
        <!-- ============================================
             SCREEN 4: HISTORY
             ============================================ -->
        <div id="screenHistory" class="screen">
            <div class="header">
                <h1 class="title">📅 Historique</h1>
                <p class="subtitle">Vos séances passées</p>
            </div>
            
            <div id="historyList">
                <!-- Populated dynamically -->
            </div>
            
            <button class="btn btn-secondary" id="btnBackToDashboard">
                ← Retour
            </button>
        </div>
        
        <!-- ============================================
             MODALS
             ============================================ -->
        <!-- Add Exercise Modal -->
        <div id="modalAddExercise" class="modal">
            <div class="modal-content">
                <h3 class="modal-title">➕ Nouvel exercice</h3>
                <div class="form-group">
                    <label class="form-label">Nom de l'exercice</label>
                    <input type="text" class="form-input" id="inputExerciseName" placeholder="Ex: Développé couché">
                </div>
                <button class="btn btn-primary" id="btnConfirmAddExercise">
                    Démarrer
                </button>
                <button class="btn btn-secondary" id="btnCancelAddExercise">
                    Annuler
                </button>
            </div>
        </div>
        
        <!-- Share Modal -->
        <div id="modalShare" class="modal">
            <div class="modal-content">
                <h3 class="modal-title">📤 Partager ma séance</h3>
                
                <div class="form-group">
                    <label class="form-label">Choisir une image de fond</label>
                    <input type="file" class="form-input" id="inputShareImage" accept="image/*">
                </div>
                
                <canvas id="shareCanvas" width="1080" height="1920"></canvas>
                
                <div id="sharePreviewContainer" style="display: none;">
                    <img id="sharePreview" class="share-preview" alt="Preview">
                </div>
                
                <button class="btn btn-primary" id="btnDownloadShare" style="display: none;">
                    💾 Télécharger
                </button>
                
                <button class="btn btn-secondary" id="btnCloseShare">
                    Fermer
                </button>
            </div>
        </div>
    </div>
    
    <!-- Toast -->
    <div class="toast" id="toast"></div>
    
    <script>
        // ============================================
        // CONFIGURATION BLE (TON CODE EXISTANT)
        // ============================================
        const BLE_SERVICE_UUID = '4fafc201-1fb5-459e-8fcc-c5c9c331914b';
        const BLE_CHARACTERISTIC_UUID = 'beb5483e-36e1-4688-b7f5-ea07361b26a8';
        
        // ============================================
        // STATE MANAGEMENT
        // ============================================
        const state = {
            isConnected: false,
            device: null,
            characteristic: null,
            currentSession: null,
            currentExercise: null,
            sessions: [],
            
            // Movement detection (TON CODE EXISTANT)
            previousZ: 1.0,
            peakZ: 1.0,
            valleyZ: 1.0,
            movementPhase: 'neutral',
            repStartTime: 0,
            velocities: []
        };
        
        // ============================================
        // LOAD/SAVE
        // ============================================
        function loadSessions() {
            const saved = localStorage.getItem('reptracker_sessions');
            state.sessions = saved ? JSON.parse(saved) : [];
        }
        
        function saveSessions() {
            localStorage.setItem('reptracker_sessions', JSON.stringify(state.sessions));
        }
        
        // ============================================
        // SCREEN NAVIGATION
        // ============================================
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }
        
        function showModal(modalId) {
            document.getElementById(modalId).classList.add('active');
        }
        
        function hideModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }
        
        // ============================================
        // BLE CONNECTION (TON CODE EXISTANT - CONSERVÉ)
        // ============================================
        async function connectBLE() {
            if (!navigator.bluetooth) {
                showToast('Web Bluetooth non supporté', 'error');
                return;
            }
            
            try {
                showToast('Recherche...');
                
                state.device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'ESP32' }],
                    optionalServices: [BLE_SERVICE_UUID]
                });
                
                const server = await state.device.gatt.connect();
                const service = await server.getPrimaryService(BLE_SERVICE_UUID);
                state.characteristic = await service.getCharacteristic(BLE_CHARACTERISTIC_UUID);
                
                await state.characteristic.startNotifications();
                state.characteristic.addEventListener('characteristicvaluechanged', handleBLEData);
                
                state.device.addEventListener('gattserverdisconnected', onDisconnect);
                
                state.isConnected = true;
                updateConnectionUI();
                showScreen('screenDashboard');
                showToast('Connecté !', 'success');
                
            } catch (error) {
                showToast('Erreur: ' + error.message, 'error');
            }
        }
        
        function disconnectBLE() {
            if (state.device && state.device.gatt.connected) {
                state.device.gatt.disconnect();
            }
            state.isConnected = false;
            updateConnectionUI();
            showScreen('screenHome');
        }
        
        function onDisconnect() {
            state.isConnected = false;
            updateConnectionUI();
            showToast('Déconnecté', 'error');
            showScreen('screenHome');
        }
        
        function updateConnectionUI() {
            const badge = document.getElementById('homeStatusBadge');
            const text = document.getElementById('homeStatusText');
            
            if (state.isConnected) {
                badge.classList.add('connected');
                text.textContent = 'Connecté';
            } else {
                badge.classList.remove('connected');
                text.textContent = 'Non connecté';
            }
        }
        
        // ============================================
        // BLE DATA HANDLING (TON ALGORITHME EXISTANT)
        // ============================================
        function handleBLEData(event) {
            try {
                const decoder = new TextDecoder('utf-8');
                const jsonString = decoder.decode(event.target.value);
                const data = JSON.parse(jsonString);
                
                // Si on a un exercice en cours, détecter les reps
                if (state.currentExercise) {
                    detectRep(data);
                }
                
            } catch (error) {
                console.error('Parse error:', error);
            }
        }
        
        // TON ALGORITHME DE DÉTECTION (CONSERVÉ)
        function detectRep(data) {
            const currentZ = data.az;
            const threshold = 0.3; // Configurable
            const minROM = 0.5;
            
            const velocity = Math.abs(currentZ - state.previousZ);
            state.velocities.push(velocity);
            if (state.velocities.length > 10) state.velocities.shift();
            
            // State machine (TON CODE)
            if (state.movementPhase === 'neutral') {
                if (currentZ < (state.previousZ - threshold)) {
                    state.movementPhase = 'down';
                    state.valleyZ = currentZ;
                    state.repStartTime = Date.now();
                }
            } else if (state.movementPhase === 'down') {
                if (currentZ < state.valleyZ) {
                    state.valleyZ = currentZ;
                } else if (currentZ > (state.valleyZ + threshold)) {
                    state.movementPhase = 'up';
                }
            } else if (state.movementPhase === 'up') {
                if (currentZ > state.peakZ) {
                    state.peakZ = currentZ;
                }
                if (currentZ > (state.peakZ - threshold * 0.5)) {
                    const rom = Math.abs(state.peakZ - state.valleyZ);
                    
                    if (rom >= minROM) {
                        registerRep();
                    }
                    
                    state.movementPhase = 'neutral';
                    state.peakZ = currentZ;
                    state.valleyZ = currentZ;
                }
            }
            
            state.previousZ = currentZ;
        }
        
        function registerRep() {
            state.currentExercise.reps++;
            updateCurrentExerciseUI();
            
            if (navigator.vibrate) {
                navigator.vibrate(100);
            }
        }
        
        // ============================================
        // SESSION MANAGEMENT
        // ============================================
        function startSession() {
            state.currentSession = {
                startTime: Date.now(),
                exercises: [],
                totalReps: 0
            };
            
            startSessionTimer();
            showScreen('screenSession');
            showToast('Séance démarrée !', 'success');
        }
        
        function addExercise() {
            showModal('modalAddExercise');
        }
        
        function confirmAddExercise() {
            const name = document.getElementById('inputExerciseName').value.trim();
            
            if (!name) {
                showToast('Entrez un nom', 'error');
                return;
            }
            
            // Terminer l'exercice précédent s'il existe
            if (state.currentExercise) {
                finishExercise();
            }
            
            // Créer nouvel exercice
            state.currentExercise = {
                name: name,
                reps: 0,
                startTime: Date.now(),
                endTime: null
            };
            
            // Reset detection
            state.previousZ = 1.0;
            state.peakZ = 1.0;
            state.valleyZ = 1.0;
            state.movementPhase = 'neutral';
            state.velocities = [];
            
            document.getElementById('inputExerciseName').value = '';
            hideModal('modalAddExercise');
            updateCurrentExerciseUI();
            showToast(`${name} démarré !`, 'success');
        }
        
        function updateCurrentExerciseUI() {
            if (state.currentExercise) {
                document.getElementById('currentExerciseContainer').style.display = 'block';
                document.getElementById('currentRepCount').textContent = state.currentExercise.reps;
            } else {
                document.getElementById('currentExerciseContainer').style.display = 'none';
            }
        }
        
        function finishExercise() {
            if (!state.currentExercise) return;
            
            state.currentExercise.endTime = Date.now();
            state.currentSession.exercises.push(state.currentExercise);
            state.currentSession.totalReps += state.currentExercise.reps;
            
            renderExerciseList();
            state.currentExercise = null;
            updateCurrentExerciseUI();
            showToast('Exercice terminé !', 'success');
        }
        
        function renderExerciseList() {
            const container = document.getElementById('exerciseList');
            
            if (state.currentSession.exercises.length === 0) {
                container.innerHTML = '';
                return;
            }
            
            container.innerHTML = state.currentSession.exercises.map((ex, i) => {
                const duration = Math.floor((ex.endTime - ex.startTime) / 1000);
                return `
                    <div class="exercise-card">
                        <div class="exercise-name">${ex.name}</div>
                        <div class="exercise-stats">
                            <div class="stat">
                                <div class="stat-label">Reps</div>
                                <div class="stat-value">${ex.reps}</div>
                            </div>
                            <div class="stat">
                                <div class="stat-label">Durée</div>
                                <div class="stat-value">${duration}s</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function endSession() {
            // Finir l'exercice en cours si existe
            if (state.currentExercise) {
                finishExercise();
            }
            
            if (state.currentSession.exercises.length === 0) {
                showToast('Ajoutez au moins un exercice', 'error');
                return;
            }
            
            state.currentSession.endTime = Date.now();
            state.currentSession.duration = Math.floor((state.currentSession.endTime - state.currentSession.startTime) / 1000);
            
            saveSession();
            stopSessionTimer();
            
            // Proposer le partage
            if (confirm('Séance terminée ! Voulez-vous la partager ?')) {
                openShareModal(state.currentSession);
            }
            
            state.currentSession = null;
            showScreen('screenDashboard');
            showToast('Séance sauvegardée !', 'success');
        }
        
        function saveSession() {
            state.sessions.push({
                date: state.currentSession.startTime,
                exercises: state.currentSession.exercises,
                totalReps: state.currentSession.totalReps,
                duration: state.currentSession.duration
            });
            
            saveSessions();
        }
        
        // ============================================
        // SESSION TIMER
        // ============================================
        let sessionTimerInterval = null;
        
        function startSessionTimer() {
            sessionTimerInterval = setInterval(() => {
                if (!state.currentSession) return;
                
                const elapsed = Math.floor((Date.now() - state.currentSession.startTime) / 1000);
                const minutes = Math.floor(elapsed / 60);
                const seconds = elapsed % 60;
                
                document.getElementById('sessionTimer').textContent = 
                    `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            }, 1000);
        }
        
        function stopSessionTimer() {
            if (sessionTimerInterval) {
                clearInterval(sessionTimerInterval);
                sessionTimerInterval = null;
            }
        }
        
        // ============================================
        // HISTORY
        // ============================================
        function viewHistory() {
            renderHistory();
            showScreen('screenHistory');
        }
        
        function renderHistory() {
            const container = document.getElementById('historyList');
            
            if (state.sessions.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: var(--text-secondary); padding: 40px;">Aucune séance enregistrée</p>';
                return;
            }
            
            container.innerHTML = state.sessions.slice().reverse().map((session, i) => {
                const date = new Date(session.date);
                const minutes = Math.floor(session.duration / 60);
                
                return `
                    <div class="session-item" onclick="openShareModal(${state.sessions.length - 1 - i})">
                        <div class="session-date">
                            ${date.toLocaleDateString('fr-FR')} à ${date.toLocaleTimeString('fr-FR', {hour: '2-digit', minute: '2-digit'})}
                        </div>
                        <div>${session.exercises.length} exercice(s)</div>
                        <div class="session-summary">
                            <div class="summary-stat">
                                <div class="summary-value">${session.totalReps}</div>
                                <div class="summary-label">Reps</div>
                            </div>
                            <div class="summary-stat">
                                <div class="summary-value">${minutes}</div>
                                <div class="summary-label">Min</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // ============================================
        // SHARE STORY
        // ============================================
        function openShareModal(sessionIndex) {
            const session = typeof sessionIndex === 'number' ? state.sessions[sessionIndex] : sessionIndex;
            
            if (!session) return;
            
            state.shareSession = session;
            showModal('modalShare');
        }
        
        document.getElementById('inputShareImage').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(event) {
                generateShareImage(event.target.result);
            };
            reader.readAsDataURL(file);
        });
        
        function generateShareImage(backgroundImage) {
            const canvas = document.getElementById('shareCanvas');
            const ctx = canvas.getContext('2d');
            
            const img = new Image();
            img.onload = function() {
                // Draw background
                ctx.drawImage(img, 0, 0, 1080, 1920);
                
                // Dark overlay
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(0, 0, 1080, 1920);
                
                // Session data
                const session = state.shareSession;
                const date = new Date(session.date);
                const minutes = Math.floor(session.duration / 60);
                
                // Title
                ctx.fillStyle = '#22c55e';
                ctx.font = 'bold 80px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('💪 MA SÉANCE', 540, 300);
                
                // Date
                ctx.fillStyle = '#ffffff';
                ctx.font = '40px sans-serif';
                ctx.fillText(date.toLocaleDateString('fr-FR'), 540, 400);
                
                // Stats
                ctx.font = 'bold 120px sans-serif';
                ctx.fillStyle = '#22c55e';
                ctx.fillText(session.totalReps, 540, 650);
                ctx.font = '50px sans-serif';
                ctx.fillStyle = '#94a3b8';
                ctx.fillText('RÉPÉTITIONS', 540, 730);
                
                ctx.font = 'bold 120px sans-serif';
                ctx.fillStyle = '#22c55e';
                ctx.fillText(minutes, 540, 950);
                ctx.font = '50px sans-serif';
                ctx.fillStyle = '#94a3b8';
                ctx.fillText('MINUTES', 540, 1030);
                
                // Exercises
                ctx.font = 'bold 60px sans-serif';
                ctx.fillStyle = '#ffffff';
                ctx.fillText('EXERCICES', 540, 1200);
                
                ctx.font = '45px sans-serif';
                ctx.textAlign = 'left';
                let y = 1300;
                session.exercises.forEach(ex => {
                    ctx.fillStyle = '#94a3b8';
                    ctx.fillText(`• ${ex.name}`, 200, y);
                    ctx.fillStyle = '#22c55e';
                    ctx.textAlign = 'right';
                    ctx.fillText(`${ex.reps} reps`, 880, y);
                    ctx.textAlign = 'left';
                    y += 80;
                });
                
                // Watermark
                ctx.font = '35px sans-serif';
                ctx.fillStyle = '#ffffff';
                ctx.textAlign = 'center';
                ctx.fillText('Rep Tracker', 540, 1820);
                
                // Show preview
                const preview = document.getElementById('sharePreview');
                preview.src = canvas.toDataURL('image/jpeg', 0.9);
                document.getElementById('sharePreviewContainer').style.display = 'block';
                document.getElementById('btnDownloadShare').style.display = 'block';
            };
            img.src = backgroundImage;
        }
        
        function downloadShareImage() {
            const canvas = document.getElementById('shareCanvas');
            const link = document.createElement('a');
            link.download = `rep-tracker-${Date.now()}.jpg`;
            link.href = canvas.toDataURL('image/jpeg', 0.9);
            link.click();
            
            showToast('Image téléchargée !', 'success');
        }
        
        // ============================================
        // UTILITIES
        // ============================================
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast show ${type}`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        // ============================================
        // EVENT LISTENERS
        // ============================================
        document.getElementById('btnConnect').addEventListener('click', connectBLE);
        document.getElementById('btnDisconnect').addEventListener('click', disconnectBLE);
        document.getElementById('btnStartSession').addEventListener('click', startSession);
        document.getElementById('btnViewHistory').addEventListener('click', viewHistory);
        document.getElementById('btnAddExercise').addEventListener('click', addExercise);
        document.getElementById('btnConfirmAddExercise').addEventListener('click', confirmAddExercise);
        document.getElementById('btnCancelAddExercise').addEventListener('click', () => hideModal('modalAddExercise'));
        document.getElementById('btnFinishExercise').addEventListener('click', finishExercise);
        document.getElementById('btnEndSession').addEventListener('click', endSession);
        document.getElementById('btnBackToDashboard').addEventListener('click', () => showScreen('screenDashboard'));
        document.getElementById('btnDownloadShare').addEventListener('click', downloadShareImage);
        document.getElementById('btnCloseShare').addEventListener('click', () => hideModal('modalShare'));
        
        // ============================================
        // INIT
        // ============================================
        loadSessions();
    </script>
</body>
</html>
