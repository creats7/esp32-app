<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Bluetooth</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            background: #0B0B0B;
            color: white;
        }
        button {
            padding: 20px 40px;
            font-size: 18px;
            background: #22c55e;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        #result {
            margin-top: 20px;
            padding: 20px;
            background: #1A1A1A;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <h1>🔍 Test Web Bluetooth</h1>
    
    <button onclick="testBluetooth()">Tester Bluetooth</button>
    
    <div id="result"></div>
    
    <script>
        function log(message, color = 'white') {
            const result = document.getElementById('result');
            result.innerHTML += `<p style="color: ${color}">${message}</p>`;
        }
        
        async function testBluetooth() {
            const result = document.getElementById('result');
            result.innerHTML = '';
            
            // Test 1: Navigator existe
            log('✓ Navigator existe: ' + (typeof navigator !== 'undefined'), '#22c55e');
            
            // Test 2: Bluetooth API existe
            if (!navigator.bluetooth) {
                log('❌ navigator.bluetooth est undefined', '#ef4444');
                log('User Agent: ' + navigator.userAgent, '#86868B');
                log('Protocol: ' + window.location.protocol, '#86868B');
                log('Host: ' + window.location.host, '#86868B');
                return;
            }
            
            log('✓ navigator.bluetooth existe', '#22c55e');
            
            // Test 3: Essayer de scanner
            try {
                log('⏳ Recherche d\'appareils...', '#86868B');
                
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['4fafc201-1fb5-459e-8fcc-c5c9c331914b']
                });
                
                log('✓ Appareil trouvé: ' + device.name, '#22c55e');
                
            } catch (error) {
                log('❌ Erreur: ' + error.message, '#ef4444');
            }
        }
    </script>
</body>
</html>
