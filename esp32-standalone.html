<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <title>Rep Tracker Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --accent-primary: #22c55e;
            --accent-secondary: #ef4444;
            --accent-blue: #3b82f6;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: #475569;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg-primary), var(--bg-secondary));
            color: var(--text-primary);
            min-height: 100vh;
            padding-bottom: 70px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Screens */
        .screen {
            display: none;
        }
        
        .screen.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Header */
        .header {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }
        
        .title {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        /* Buttons */
        .btn {
            width: 100%;
            min-height: 56px;
            padding: 16px 24px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 12px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-primary), #16a34a);
            color: white;
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
        }
        
        .btn-primary:active { transform: scale(0.98); }
        
        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }
        
        .btn-danger {
            background: var(--accent-secondary);
            color: white;
        }
        
        .btn-small {
            min-height: 40px;
            padding: 10px 16px;
            font-size: 14px;
        }
        
        /* Status */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--bg-tertiary);
            border-radius: 20px;
            font-size: 13px;
            margin-top: 12px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-secondary);
        }
        
        .status-badge.connected .status-dot {
            background: var(--accent-primary);
            box-shadow: 0 0 8px var(--accent-primary);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        /* Session Timer */
        .session-timer {
            font-size: 48px;
            font-weight: 700;
            color: var(--accent-primary);
            text-align: center;
            margin: 20px 0;
        }
        
        /* Current Exercise Display */
        .current-exercise-display {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.1), rgba(59, 130, 246, 0.1));
            border: 2px solid var(--accent-primary);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
        }
        
        .current-exercise-name {
            font-size: 20px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 8px;
        }
        
        .current-exercise-weight {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .stat-card {
            text-align: center;
            padding: 16px;
            background: var(--bg-secondary);
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }
        
        .stat-label {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--accent-primary);
        }
        
        .stat-unit {
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        /* Exercise List */
        .exercise-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 12px;
        }
        
        .exercise-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .exercise-name {
            font-size: 18px;
            font-weight: 600;
        }
        
        .exercise-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 12px;
        }
        
        .exercise-stat {
            text-align: center;
        }
        
        .exercise-stat-label {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
        }
        
        .exercise-stat-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--accent-primary);
        }
        
        /* Library Items */
        .library-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .library-item-name {
            font-size: 16px;
            font-weight: 500;
        }
        
        /* Selection List */
        .selection-list {
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 16px;
        }
        
        .selection-item {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .selection-item:hover {
            border-color: var(--accent-primary);
        }
        
        .selection-item:active {
            transform: scale(0.98);
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            padding: 20px;
            overflow-y: auto;
        }
        
        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 24px;
            max-width: 500px;
            width: 100%;
            border: 1px solid var(--border-color);
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        
        /* Form */
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }
        
        .form-input {
            width: 100%;
            padding: 12px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 16px;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--accent-primary);
        }
        
        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            z-index: 100;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 16px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
            background: none;
            border: none;
        }
        
        .nav-item.active {
            color: var(--accent-primary);
        }
        
        .nav-icon {
            font-size: 24px;
        }
        
        .nav-label {
            font-size: 11px;
            font-weight: 600;
        }
        
        .toast {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            max-width: 400px;
            margin: 0 auto;
            padding: 16px 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-left: 4px solid var(--accent-primary);
            border-radius: 12px;
            color: white;
            transform: translateY(-200px);
            transition: transform 0.3s;
            z-index: 2000;
        }
        
        .toast.show {
            transform: translateY(0);
        }
        
        .toast.error {
            border-left-color: var(--accent-secondary);
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ============================================
             SCREEN: HOME
             ============================================ -->
        <div id="screenHome" class="screen active">
            <div class="header">
                <h1 class="title">💪 Rep Tracker</h1>
                <p class="subtitle">Musculation connectée</p>
                <div class="status-badge" id="homeStatusBadge">
                    <span class="status-dot"></span>
                    <span id="homeStatusText">Non connecté</span>
                </div>
            </div>
            
            <button class="btn btn-primary" id="btnConnect">
                📡 Connecter le boîtier
            </button>
        </div>
        
        <!-- ============================================
             SCREEN: DASHBOARD
             ============================================ -->
        <div id="screenDashboard" class="screen">
            <div class="header">
                <h1 class="title">📊 Dashboard</h1>
                <p class="subtitle">Prêt à vous entraîner</p>
            </div>
            
            <button class="btn btn-primary" id="btnStartSession">
                🏋️ Démarrer une séance
            </button>
            
            <button class="btn btn-secondary" id="btnViewHistory">
                📅 Historique
            </button>
            
            <button class="btn btn-secondary" id="btnDisconnect">
                🔌 Déconnecter
            </button>
        </div>
        
        <!-- ============================================
             SCREEN: SESSION
             ============================================ -->
        <div id="screenSession" class="screen">
            <div class="header">
                <h2 class="title" style="font-size: 20px;">Séance en cours</h2>
                <div class="session-timer" id="sessionTimer">00:00</div>
            </div>
            
            <!-- Current Exercise -->
            <div id="currentExerciseContainer" class="hidden">
                <div class="current-exercise-display">
                    <div class="current-exercise-name" id="currentExerciseName">—</div>
                    <div class="current-exercise-weight" id="currentExerciseWeight">—</div>
                    
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-label">Reps</div>
                            <div class="stat-value" id="currentReps">0</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Vitesse</div>
                            <div class="stat-value" id="currentVelocity">0<span class="stat-unit">m/s</span></div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Moy.</div>
                            <div class="stat-value" id="avgVelocity">0<span class="stat-unit">m/s</span></div>
                        </div>
                    </div>
                    
                    <button class="btn btn-secondary" id="btnFinishExercise">
                        ✅ Terminer l'exercice
                    </button>
                </div>
            </div>
            
            <!-- Exercise List -->
            <div id="exerciseList"></div>
            
            <button class="btn btn-primary" id="btnAddExercise">
                ➕ Ajouter un exercice
            </button>
            
            <button class="btn btn-danger" id="btnEndSession">
                🏁 Terminer la séance
            </button>
        </div>
        
        <!-- ============================================
             SCREEN: HISTORY
             ============================================ -->
        <div id="screenHistory" class="screen">
            <div class="header">
                <h1 class="title">📅 Historique</h1>
            </div>
            
            <div id="historyList"></div>
            
            <button class="btn btn-secondary" id="btnBackFromHistory">
                ← Retour
            </button>
        </div>
        
        <!-- ============================================
             SCREEN: PROFILE
             ============================================ -->
        <div id="screenProfile" class="screen">
            <div class="header">
                <h1 class="title">⚙️ Mes exercices</h1>
                <p class="subtitle">Bibliothèque personnelle</p>
            </div>
            
            <div id="exerciseLibrary"></div>
            
            <button class="btn btn-primary" id="btnAddToLibrary">
                ➕ Nouvel exercice
            </button>
        </div>
    </div>
    
    <!-- ============================================
         MODALS
         ============================================ -->
    <!-- Select Exercise -->
    <div id="modalSelectExercise" class="modal">
        <div class="modal-content">
            <h3 class="modal-title">Choisir un exercice</h3>
            <div class="selection-list" id="exerciseSelectionList"></div>
            <button class="btn btn-secondary" id="btnCancelSelect">Annuler</button>
        </div>
    </div>
    
    <!-- Set Weight -->
    <div id="modalSetWeight" class="modal">
        <div class="modal-content">
            <h3 class="modal-title" id="modalWeightTitle">Poids</h3>
            <div class="form-group">
                <label class="form-label">Poids (kg)</label>
                <input type="number" class="form-input" id="inputWeight" placeholder="Ex: 20" step="0.5" min="0">
            </div>
            <button class="btn btn-primary" id="btnConfirmWeight">Démarrer</button>
            <button class="btn btn-secondary" id="btnCancelWeight">Annuler</button>
        </div>
    </div>
    
    <!-- Add to Library -->
    <div id="modalAddLibrary" class="modal">
        <div class="modal-content">
            <h3 class="modal-title">Nouvel exercice</h3>
            <div class="form-group">
                <label class="form-label">Nom de l'exercice</label>
                <input type="text" class="form-input" id="inputLibraryName" placeholder="Ex: Curl biceps">
            </div>
            <button class="btn btn-primary" id="btnConfirmLibrary">Ajouter</button>
            <button class="btn btn-secondary" id="btnCancelLibrary">Annuler</button>
        </div>
    </div>
    
    <!-- Bottom Nav -->
    <nav class="bottom-nav">
        <button class="nav-item" data-screen="screenDashboard">
            <div class="nav-icon">🏠</div>
            <div class="nav-label">Accueil</div>
        </button>
        <button class="nav-item" data-screen="screenHistory">
            <div class="nav-icon">📊</div>
            <div class="nav-label">Historique</div>
        </button>
        <button class="nav-item" data-screen="screenProfile">
            <div class="nav-icon">⚙️</div>
            <div class="nav-label">Exercices</div>
        </button>
    </nav>
    
    <div class="toast" id="toast"></div>
    
    <script>
        // ============================================
        // CONFIG BLE
        // ============================================
        const BLE_SERVICE_UUID = '4fafc201-1fb5-459e-8fcc-c5c9c331914b';
        const BLE_CHARACTERISTIC_UUID = 'beb5483e-36e1-4688-b7f5-ea07361b26a8';
        
        // ============================================
        // STATE
        // ============================================
        const state = {
            // BLE
            isConnected: false,
            device: null,
            characteristic: null,
            
            // Library
            exercises: [],
            
            // Session
            currentSession: null,
            currentExercise: null,
            sessions: [],
            
            // Detection
            previousZ: 1.0,
            peakZ: 1.0,
            valleyZ: 1.0,
            movementPhase: 'neutral',
            repStartTime: 0,
            velocities: [],
            
            // Selected exercise for adding
            selectedExercise: null
        };
        
        // ============================================
        // VELOCITY CALCULATION
        // ============================================
        function calculateVelocity(sensorData) {
            const currentZ = sensorData.az;
            const velocity = Math.abs(currentZ - state.previousZ) * 10; // m/s approximation
            return velocity;
        }
        
        // ============================================
        // STORAGE
        // ============================================
        function loadData() {
            const savedExercises = localStorage.getItem('rt_exercises');
            state.exercises = savedExercises ? JSON.parse(savedExercises) : [];
            
            const savedSessions = localStorage.getItem('rt_sessions');
            state.sessions = savedSessions ? JSON.parse(savedSessions) : [];
        }
        
        function saveData() {
            localStorage.setItem('rt_exercises', JSON.stringify(state.exercises));
            localStorage.setItem('rt_sessions', JSON.stringify(state.sessions));
        }
        
        // ============================================
        // NAVIGATION
        // ============================================
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            document.getElementById(screenId).classList.add('active');
            const navItem = document.querySelector(`[data-screen="${screenId}"]`);
            if (navItem) navItem.classList.add('active');
            
            if (screenId === 'screenProfile') renderLibrary();
            if (screenId === 'screenHistory') renderHistory();
        }
        
        function showModal(modalId) {
            document.getElementById(modalId).classList.add('active');
        }
        
        function hideModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }
        
        // ============================================
        // BLE
        // ============================================
        async function connectBLE() {
            if (!navigator.bluetooth) {
                showToast('Web Bluetooth non supporté', 'error');
                return;
            }
            
            try {
                showToast('Recherche...');
                
                state.device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'ESP32' }],
                    optionalServices: [BLE_SERVICE_UUID]
                });
                
                const server = await state.device.gatt.connect();
                const service = await server.getPrimaryService(BLE_SERVICE_UUID);
                state.characteristic = await service.getCharacteristic(BLE_CHARACTERISTIC_UUID);
                
                await state.characteristic.startNotifications();
                state.characteristic.addEventListener('characteristicvaluechanged', handleBLEData);
                
                state.device.addEventListener('gattserverdisconnected', onDisconnect);
                
                state.isConnected = true;
                updateConnectionUI();
                showScreen('screenDashboard');
                showToast('Connecté !', 'success');
                
            } catch (error) {
                showToast('Erreur: ' + error.message, 'error');
            }
        }
        
        function disconnectBLE() {
            if (state.device && state.device.gatt.connected) {
                state.device.gatt.disconnect();
            }
            state.isConnected = false;
            updateConnectionUI();
            showScreen('screenHome');
        }
        
        function onDisconnect() {
            state.isConnected = false;
            updateConnectionUI();
            showToast('Déconnecté', 'error');
            showScreen('screenHome');
        }
        
        function updateConnectionUI() {
            const badge = document.getElementById('homeStatusBadge');
            const text = document.getElementById('homeStatusText');
            
            if (state.isConnected) {
                badge.classList.add('connected');
                text.textContent = 'Connecté';
            } else {
                badge.classList.remove('connected');
                text.textContent = 'Non connecté';
            }
        }
        
        function handleBLEData(event) {
            try {
                const decoder = new TextDecoder('utf-8');
                const jsonString = decoder.decode(event.target.value);
                const data = JSON.parse(jsonString);
                
                if (state.currentExercise) {
                    const velocity = calculateVelocity(data);
                    state.currentExercise.velocities.push(velocity);
                    
                    // Update UI
                    updateVelocityDisplay(velocity);
                    
                    // Detect rep
                    detectRep(data);
                }
                
            } catch (error) {
                console.error('Parse error:', error);
            }
        }
        
        function updateVelocityDisplay(currentVelocity) {
            document.getElementById('currentVelocity').innerHTML = currentVelocity.toFixed(2) + '<span class="stat-unit">m/s</span>';
            
            if (state.currentExercise.velocities.length > 0) {
                const avg = state.currentExercise.velocities.reduce((a, b) => a + b, 0) / state.currentExercise.velocities.length;
                document.getElementById('avgVelocity').innerHTML = avg.toFixed(2) + '<span class="stat-unit">m/s</span>';
            }
        }
        
        function detectRep(data) {
            const currentZ = data.az;
            const threshold = 0.3;
            const minROM = 0.5;
            
            if (state.movementPhase === 'neutral') {
                if (currentZ < (state.previousZ - threshold)) {
                    state.movementPhase = 'down';
                    state.valleyZ = currentZ;
                    state.repStartTime = Date.now();
                }
            } else if (state.movementPhase === 'down') {
                if (currentZ < state.valleyZ) {
                    state.valleyZ = currentZ;
                } else if (currentZ > (state.valleyZ + threshold)) {
                    state.movementPhase = 'up';
                }
            } else if (state.movementPhase === 'up') {
                if (currentZ > state.peakZ) {
                    state.peakZ = currentZ;
                }
                if (currentZ > (state.peakZ - threshold * 0.5)) {
                    const rom = Math.abs(state.peakZ - state.valleyZ);
                    
                    if (rom >= minROM) {
                        registerRep();
                    }
                    
                    state.movementPhase = 'neutral';
                    state.peakZ = currentZ;
                    state.valleyZ = currentZ;
                }
            }
            
            state.previousZ = currentZ;
        }
        
        function registerRep() {
            state.currentExercise.reps++;
            document.getElementById('currentReps').textContent = state.currentExercise.reps;
            
            if (navigator.vibrate) {
                navigator.vibrate(100);
            }
        }
        
        // ============================================
        // LIBRARY
        // ============================================
        function addToLibrary() {
            showModal('modalAddLibrary');
        }
        
        function confirmAddLibrary() {
            const name = document.getElementById('inputLibraryName').value.trim();
            
            if (!name) {
                showToast('Entrez un nom', 'error');
                return;
            }
            
            state.exercises.push({
                id: Date.now(),
                name: name
            });
            
            saveData();
            renderLibrary();
            hideModal('modalAddLibrary');
            document.getElementById('inputLibraryName').value = '';
            showToast('Exercice ajouté !', 'success');
        }
        
        function deleteFromLibrary(id) {
            if (confirm('Supprimer cet exercice ?')) {
                state.exercises = state.exercises.filter(ex => ex.id !== id);
                saveData();
                renderLibrary();
                showToast('Exercice supprimé', 'success');
            }
        }
        
        function renderLibrary() {
            const container = document.getElementById('exerciseLibrary');
            
            if (state.exercises.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: var(--text-secondary); padding: 40px;">Aucun exercice. Ajoutez-en un !</p>';
                return;
            }
            
            container.innerHTML = state.exercises.map(ex => `
                <div class="library-item">
                    <div class="library-item-name">${ex.name}</div>
                    <button class="btn btn-danger btn-small" onclick="deleteFromLibrary(${ex.id})">🗑️</button>
                </div>
            `).join('');
        }
        
        // ============================================
        // SESSION
        // ============================================
        let sessionTimerInterval = null;
        
        function startSession() {
            state.currentSession = {
                startTime: Date.now(),
                exercises: [],
                totalReps: 0
            };
            
            sessionTimerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - state.currentSession.startTime) / 1000);
                const minutes = Math.floor(elapsed / 60);
                const seconds = elapsed % 60;
                document.getElementById('sessionTimer').textContent = 
                    `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            }, 1000);
            
            showScreen('screenSession');
            showToast('Séance démarrée !', 'success');
        }
        
        function addExercise() {
            if (state.exercises.length === 0) {
                showToast('Créez d\'abord des exercices dans Profil', 'error');
                return;
            }
            
            renderExerciseSelection();
            showModal('modalSelectExercise');
        }
        
        function renderExerciseSelection() {
            const container = document.getElementById('exerciseSelectionList');
            container.innerHTML = state.exercises.map(ex => `
                <div class="selection-item" onclick="selectExercise(${ex.id})">
                    ${ex.name}
                </div>
            `).join('');
        }
        
        function selectExercise(id) {
            state.selectedExercise = state.exercises.find(ex => ex.id === id);
            hideModal('modalSelectExercise');
            
            document.getElementById('modalWeightTitle').textContent = state.selectedExercise.name;
            showModal('modalSetWeight');
        }
        
        function confirmWeight() {
            const weight = parseFloat(document.getElementById('inputWeight').value);
            
            if (!weight || weight <= 0) {
                showToast('Entrez un poids valide', 'error');
                return;
            }
            
            // Finish previous exercise if exists
            if (state.currentExercise) {
                finishExercise();
            }
            
            // Create new exercise
            state.currentExercise = {
                name: state.selectedExercise.name,
                weight: weight,
                reps: 0,
                velocities: [],
                startTime: Date.now(),
                endTime: null
            };
            
            // Reset detection
            state.previousZ = 1.0;
            state.peakZ = 1.0;
            state.valleyZ = 1.0;
            state.movementPhase = 'neutral';
            state.velocities = [];
            
            // Update UI
            document.getElementById('currentExerciseName').textContent = state.currentExercise.name;
            document.getElementById('currentExerciseWeight').textContent = `${weight} kg`;
            document.getElementById('currentReps').textContent = '0';
            document.getElementById('currentVelocity').innerHTML = '0<span class="stat-unit">m/s</span>';
            document.getElementById('avgVelocity').innerHTML = '0<span class="stat-unit">m/s</span>';
            document.getElementById('currentExerciseContainer').classList.remove('hidden');
            
            hideModal('modalSetWeight');
            document.getElementById('inputWeight').value = '';
            showToast(`${state.currentExercise.name} démarré !`, 'success');
        }
        
        function finishExercise() {
            if (!state.currentExercise) return;
            
            state.currentExercise.endTime = Date.now();
            const duration = Math.floor((state.currentExercise.endTime - state.currentExercise.startTime) / 1000);
            state.currentExercise.duration = duration;
            
            const avgVel = state.currentExercise.velocities.length > 0 
                ? state.currentExercise.velocities.reduce((a, b) => a + b, 0) / state.currentExercise.velocities.length 
                : 0;
            state.currentExercise.avgVelocity = avgVel;
            
            state.currentSession.exercises.push(state.currentExercise);
            state.currentSession.totalReps += state.currentExercise.reps;
            
            renderExerciseList();
            state.currentExercise = null;
            document.getElementById('currentExerciseContainer').classList.add('hidden');
            showToast('Exercice terminé !', 'success');
        }
        
        function renderExerciseList() {
            const container = document.getElementById('exerciseList');
            
            if (!state.currentSession || state.currentSession.exercises.length === 0) {
                container.innerHTML = '';
                return;
            }
            
            container.innerHTML = state.currentSession.exercises.map(ex => `
                <div class="exercise-card">
                    <div class="exercise-header">
                        <div class="exercise-name">${ex.name}</div>
                        <div style="color: var(--text-secondary);">${ex.weight} kg</div>
                    </div>
                    <div class="exercise-stats">
                        <div class="exercise-stat">
                            <div class="exercise-stat-label">Reps</div>
                            <div class="exercise-stat-value">${ex.reps}</div>
                        </div>
                        <div class="exercise-stat">
                            <div class="exercise-stat-label">Vitesse</div>
                            <div class="exercise-stat-value">${ex.avgVelocity.toFixed(2)}</div>
                        </div>
                        <div class="exercise-stat">
                            <div class="exercise-stat-label">Durée</div>
                            <div class="exercise-stat-value">${ex.duration}s</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function endSession() {
            if (state.currentExercise) {
                finishExercise();
            }
            
            if (!state.currentSession || state.currentSession.exercises.length === 0) {
                showToast('Ajoutez au moins un exercice', 'error');
                return;
            }
            
            state.currentSession.endTime = Date.now();
            state.currentSession.duration = Math.floor((state.currentSession.endTime - state.currentSession.startTime) / 1000);
            
            state.sessions.push({
                date: state.currentSession.startTime,
                exercises: state.currentSession.exercises,
                totalReps: state.currentSession.totalReps,
                duration: state.currentSession.duration
            });
            
            saveData();
            
            if (sessionTimerInterval) {
                clearInterval(sessionTimerInterval);
                sessionTimerInterval = null;
            }
            
            state.currentSession = null;
            showScreen('screenDashboard');
            showToast('Séance sauvegardée !', 'success');
        }
        
        // ============================================
        // HISTORY
        // ============================================
        function renderHistory() {
            const container = document.getElementById('historyList');
            
            if (state.sessions.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: var(--text-secondary); padding: 40px;">Aucune séance</p>';
                return;
            }
            
            container.innerHTML = state.sessions.slice().reverse().map(session => {
                const date = new Date(session.date);
                const minutes = Math.floor(session.duration / 60);
                
                return `
                    <div class="exercise-card">
                        <div style="color: var(--text-secondary); margin-bottom: 8px;">
                            ${date.toLocaleDateString('fr-FR')} à ${date.toLocaleTimeString('fr-FR', {hour: '2-digit', minute: '2-digit'})}
                        </div>
                        <div style="margin-bottom: 12px;">${session.exercises.length} exercice(s)</div>
                        <div class="exercise-stats">
                            <div class="exercise-stat">
                                <div class="exercise-stat-label">Reps</div>
                                <div class="exercise-stat-value">${session.totalReps}</div>
                            </div>
                            <div class="exercise-stat">
                                <div class="exercise-stat-label">Durée</div>
                                <div class="exercise-stat-value">${minutes}min</div>
                            </div>
                            <div class="exercise-stat">
                                <div class="exercise-stat-label">Exercices</div>
                                <div class="exercise-stat-value">${session.exercises.length}</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // ============================================
        // UTILITIES
        // ============================================
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast show ${type}`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        // ============================================
        // EVENT LISTENERS
        // ============================================
        document.getElementById('btnConnect').addEventListener('click', connectBLE);
        document.getElementById('btnDisconnect').addEventListener('click', disconnectBLE);
        document.getElementById('btnStartSession').addEventListener('click', startSession);
        document.getElementById('btnViewHistory').addEventListener('click', () => showScreen('screenHistory'));
        document.getElementById('btnBackFromHistory').addEventListener('click', () => showScreen('screenDashboard'));
        document.getElementById('btnAddExercise').addEventListener('click', addExercise);
        document.getElementById('btnFinishExercise').addEventListener('click', finishExercise);
        document.getElementById('btnEndSession').addEventListener('click', endSession);
        
        // Library
        document.getElementById('btnAddToLibrary').addEventListener('click', addToLibrary);
        document.getElementById('btnConfirmLibrary').addEventListener('click', confirmAddLibrary);
        document.getElementById('btnCancelLibrary').addEventListener('click', () => hideModal('modalAddLibrary'));
        
        // Exercise selection
        document.getElementById('btnCancelSelect').addEventListener('click', () => hideModal('modalSelectExercise'));
        document.getElementById('btnConfirmWeight').addEventListener('click', confirmWeight);
        document.getElementById('btnCancelWeight').addEventListener('click', () => hideModal('modalSetWeight'));
        
        // Bottom nav
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                if (state.isConnected) {
                    showScreen(item.dataset.screen);
                }
            });
        });
        
        // ============================================
        // INIT
        // ============================================
        loadData();
    </script>
</body>
</html>
